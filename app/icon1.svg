<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Brand favicon: amber truck silhouette on asphalt, matching the hero
       TruckGraphic (cab left, trailer right). Kept to bold simple shapes so
       it still reads at 16px. -->
  <rect width="64" height="64" rx="10" fill="#14181c"/>
  <!-- cab: lower body + raised roof step -->
  <rect x="7" y="21" width="9" height="19" rx="1.5" fill="#f2a93b"/>
  <rect x="7" y="28" width="16" height="12" rx="1.5" fill="#f2a93b"/>
  <!-- exhaust stack -->
  <rect x="8.5" y="15" width="2.5" height="7" rx="1" fill="#f2a93b"/>
  <!-- trailer -->
  <rect x="25" y="20" width="32" height="20" rx="1.5" fill="#f2a93b"/>
  <!-- wheels: amber tires with asphalt hubs -->
  <circle cx="14" cy="44" r="5" fill="#f2a93b"/>
  <circle cx="14" cy="44" r="2" fill="#14181c"/>
  <circle cx="34" cy="44" r="5" fill="#f2a93b"/>
  <circle cx="34" cy="44" r="2" fill="#14181c"/>
  <circle cx="49" cy="44" r="5" fill="#f2a93b"/>
  <circle cx="49" cy="44" r="2" fill="#14181c"/>
  <!-- ground line -->
  <rect x="6" y="51" width="52" height="2" rx="1" fill="#f2a93b" opacity="0.45"/>
</svg>
